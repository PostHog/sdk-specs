name: OpenSpec

on:
  pull_request:
    paths:
      - 'openspec/**'
      - '.github/workflows/openspec.yml'
  push:
    branches:
      - main
    paths:
      - 'openspec/**'
      - '.github/workflows/openspec.yml'

permissions:
  contents: read

jobs:
  validate:
    name: Validate specs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install OpenSpec CLI
        run: npm install -g @fission-ai/openspec@1.4.1

      - name: Validate OpenSpec specs
        env:
          OPENSPEC_TELEMETRY: '0'
        run: openspec validate --specs --strict --no-interactive
